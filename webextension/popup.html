<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 0;
        padding: 10px 12px;
        min-width: 220px;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      #status {
        color: #333;
        margin-bottom: 6px;
      }
      #status.error {
        color: #c62828;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li button {
        width: 100%;
        text-align: left;
        background: #f3f3f3;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 6px 8px;
        margin: 4px 0;
        cursor: pointer;
        font: inherit;
      }
      li button:hover {
        background: #e7e7e7;
      }
      .name {
        font-weight: 600;
      }
      .user {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>pw</h1>
    <div id="status">Looking up login…</div>
    <ul id="list"></ul>
    <script src="popup.js"></script>
  </body>
</html>
